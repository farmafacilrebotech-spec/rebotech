<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automatización — ReBoTech</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Syne:wght@800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  background:#05080c;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:Inter;
}

.card{
  width:560px;
  height:640px;
  padding:28px;
  border-radius:24px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:
  linear-gradient(180deg,rgba(5,10,15,.9),rgba(5,10,15,.98)),
  url('/images/ai-bg.jpg') center/cover;
  border:1px solid rgba(78,211,194,.2);
}

.tag{
  font-size:10px;
  color:#4ed3c2;
  border:1px solid rgba(78,211,194,.3);
  border-radius:999px;
  padding:6px 12px;
  display:inline-block;
}

/* FLOW */
.flow{
  margin-top:20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.node{
  width:110px;
  height:70px;
  border-radius:14px;
  background:rgba(10,20,25,.7);
  border:1px solid rgba(78,211,194,.25);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  text-align:center;
  color:#d1f7f2;
  position:relative;
}

.node::after{
  content:"";
  position:absolute;
  right:-20px;
  width:20px;
  height:2px;
  background:#4ed3c2;
}

.node:last-child::after{display:none}

/* animación flujo */
.node{
  animation: flow 3s infinite;
}

.node:nth-child(2){animation-delay:.5s}
.node:nth-child(3){animation-delay:1s}
.node:nth-child(4){animation-delay:1.5s}

@keyframes flow{
  0%,100%{opacity:.4}
  50%{opacity:1}
}

/* STATS */
.stats{display:flex;gap:10px}

.stat{
  flex:1;
  text-align:center;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,.03);
}

.stat b{color:#4ed3c2;font-size:18px}

/* TITULO */
h1{
  font-family:Syne;
  font-size:28px;
  color:#d1d5db;
}

h1 span{
  color:#4ed3c2;
  text-shadow:0 0 12px rgba(78,211,194,.6);
}

p{color:rgba(255,255,255,.6);font-size:13px}

/* CTA */
.cta{
  margin-top:12px;
  padding:12px 18px;
  border-radius:999px;
  background:linear-gradient(135deg,#4ed3c2,#1abbb3);
  color:#003a35;
  font-weight:700;
}
</style>
</head>

<body>

<div class="card">

<div class="tag">ReBoTech · Automatización</div>

<div class="flow">
<div class="node">Cliente</div>
<div class="node">Formulario</div>
<div class="node">IA</div>
<div class="node">Respuesta</div>
</div>

<div class="stats">
<div class="stat"><b>-80%</b><span>tiempo</span></div>
<div class="stat"><b>+3x</b><span>leads</span></div>
<div class="stat"><b>24/7</b><span>activo</span></div>
</div>

<div>
<h1>Procesos que <span>trabajan por ti</span></h1>
<p>Automatiza tareas, capta clientes y ahorra horas cada día.</p>
<div class="cta">Solicitar diagnóstico →</div>
</div>

</div>

</body>
</html>
